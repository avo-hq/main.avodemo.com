# Database-backed Action Cable adapter (solid_cable). Runs on a dedicated
# SQLite database (`cable` in config/database.yml), separate from the primary
# Postgres database — no Redis pub/sub needed.
development:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day

test:
  adapter: test

production:
  adapter: solid_cable
  connects_to:
    database:
      writing: cable
  polling_interval: 0.1.seconds
  message_retention: 1.day
